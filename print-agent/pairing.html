<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>EventMeet Print Agent — Pair</title>
  <style>
    body { font-family: -apple-system, Helvetica, Arial, sans-serif; padding: 24px; }
    h1 { font-size: 16px; margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
    input { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 12px; font-size: 14px; }
    button { width: 100%; padding: 10px; font-size: 14px; cursor: pointer; }
    #status { font-size: 12px; color: #c00; min-height: 16px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Pair this station</h1>
  <div id="reason" style="font-size: 12px; color: #a60; margin-bottom: 12px;"></div>

  <label for="serverUrl">Server URL</label>
  <input id="serverUrl" placeholder="https://acme.eventmeet.example" />

  <label for="pairingCode">Pairing code</label>
  <input id="pairingCode" placeholder="From Print Stations in the admin console" />

  <button id="pairButton">Pair</button>
  <div id="status"></div>

  <script>
    // Pre-filled from main.js when this window is opened automatically after repeated connection
    // failures (previously-saved config exists but its credential no longer works — e.g. a
    // revoked station) — carries over the last-known-good server URL and explains why the window
    // showed up unprompted, so re-pairing is just "type the new code," not "hunt for the tray menu."
    const params = new URLSearchParams(location.search)
    if (params.get("serverUrl")) document.getElementById("serverUrl").value = params.get("serverUrl")
    if (params.get("reason")) document.getElementById("reason").textContent = params.get("reason")

    document.getElementById("pairButton").addEventListener("click", async () => {
      const serverUrl = document.getElementById("serverUrl").value.trim().replace(/\/$/, "")
      const pairingCode = document.getElementById("pairingCode").value.trim()
      const statusEl = document.getElementById("status")
      statusEl.style.color = "#555"
      statusEl.textContent = "Pairing…"

      const result = await window.printAgent.pair(serverUrl, pairingCode)
      if (result.error) {
        statusEl.style.color = "#c00"
        statusEl.textContent = result.error
      } else {
        statusEl.style.color = "#080"
        statusEl.textContent = "Paired — this window will close."
      }
    })
  </script>
</body>
</html>
