# Action Cable runs over Redis pub/sub in every environment except test, per requirement.md §4.10 —
# this is the single real-time transport for both the admin console and (later) the Next.js public site's
# read-only PublicEventLiveChannel (§5.15). Redis is also what backs the fan-out load-tested in Phase 9.
development:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL", "redis://localhost:6379/1") %>
  channel_prefix: eventmeet_development

test:
  adapter: test

production:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") { "redis://localhost:6379/1" } %>
  channel_prefix: eventmeet_production
