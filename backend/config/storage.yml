test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Credentials come from config/cloudinary.yml (CLOUD_NAME/API_KEY/API_SECRET, loaded via Figaro
# from config/application.yml — gitignored, never committed) — the cloudinary gem reads that file
# itself. Same three-env-var setup as the sibling event_management project, not a single
# CLOUDINARY_URL connection string. `folder` here is a fixed root prefix shared by every upload
# through this service, used only to separate environments sharing one Cloudinary account; actual
# tenant-wise nesting comes from the blob key itself (e.g.
# "acme/participants/<event_id>/photo/<uuid>-file.jpg"), which Cloudinary treats as folder path
# segments via the "/" characters in the public_id.
cloudinary:
  service: Cloudinary
  folder: "eventmeet/<%= Rails.env %>"

# Use bin/rails credentials:edit to set the AWS secrets (as aws:access_key_id|secret_access_key)
# amazon:
#   service: S3
#   access_key_id: <%= Rails.application.credentials.dig(:aws, :access_key_id) %>
#   secret_access_key: <%= Rails.application.credentials.dig(:aws, :secret_access_key) %>
#   region: us-east-1
#   bucket: your_own_bucket-<%= Rails.env %>

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket-<%= Rails.env %>

# Use bin/rails credentials:edit to set the Azure Storage secret (as azure_storage:storage_access_key)
# microsoft:
#   service: AzureStorage
#   storage_account_name: your_account_name
#   storage_access_key: <%= Rails.application.credentials.dig(:azure_storage, :storage_access_key) %>
#   container: your_container_name-<%= Rails.env %>

